<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Booknest</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="login-body">

  <!-- Contenedor principal del formulario de inicio de sesión -->
  <div class="login-box">
    <h2>Iniciar Sesión</h2>

    <!-- Formulario de login.
         onsubmit llama a la función login() y evita que la página se recargue -->
    <form onsubmit="login(event)">

      <!-- Campo para ingresar el correo -->
      <label for="email">Correo:</label>
      <input type="email" id="email" placeholder="usuario@booknest.com" required>

      <!-- Campo para ingresar la contraseña -->
      <label for="password">Contraseña:</label>

      <!-- Contenedor para la contraseña y el icono del ojo -->
      <div class="password-container">

        <!-- Input de contraseña -->
        <input type="password" id="password" required>

        <!-- Botón visual (icono) para mostrar u ocultar la contraseña -->
        <span class="toggle-password" onclick="togglePassword('password')">

          <!-- Icono de ojo abierto (contraseña oculta) -->
          <svg class="icon-eye" width="22" height="22" viewBox="0 0 24 24" fill="#333">
            <path d="M12 4.5C7 4.5 2.73 8.11 1 12c1.73 3.89 6 7.5 11 7.5s9.27-3.61 11-7.5c-1.73-3.89-6-7.5-11-7.5zm0 12a4.5 4.5 0 1 1 0-9 4.5 4.5 0 0 1 0 9z"/>
          </svg>

          <!-- Icono de ojo tachado (contraseña visible) -->
          <svg class="icon-eye-slash" width="22" height="22" viewBox="0 0 24 24" fill="#333" style="display:none">
            <path d="M12 5C7 5 2.73 8.11 1 12a11.94 11.94 0 0 0 2.12 3.06L2 16.18 3.41 17.6l18.02-18.02L22 1.18 20.59 2.6l-2.12 2.12C16.9 3.84 14.53 3 12 3 7 3 2.73 6.11 1 10c1.73 3.89 6 7 11 7 2.53 0 4.9-.84 6.47-2.27l2.12 2.12L22 15.82l-2.12-2.12A11.94 11.94 0 0 0 23 10c-1.73-3.89-6-7-11-7z"/>
          </svg>

        </span>
      </div>

      <!-- Botón para enviar el formulario -->
      <button type="submit">Entrar</button>
    </form>

    <!-- Enlace para recuperar contraseña -->
    <a href="forgot-password.html">¿Olvidaste tu contraseña?</a>

    <!-- Enlace para crear cuenta -->
    <p>¿No tienes cuenta? <a href="register.html">Crear cuenta</a></p>
  </div>

  <script>

    // Función para mostrar u ocultar la contraseña
    function togglePassword(inputId) {

      // Obtener el input de contraseña por su ID
      const input = document.getElementById(inputId);

      // Obtener el contenedor donde está el input
      const container = input.parentNode;

      // Obtener el icono de ojo abierto
      const eye = container.querySelector('.icon-eye');

      // Obtener el icono de ojo tachado
      const eyeSlash = container.querySelector('.icon-eye-slash');

      // Si el input está como tipo password (oculto)
      if (input.type === 'password') {

        // Cambiar a texto para mostrar la contraseña
        input.type = 'text';

        // Ocultar el icono de ojo abierto
        eye.style.display = 'none';

        // Mostrar el icono de ojo tachado
        eyeSlash.style.display = 'inline';

      } else {

        // Volver a ocultar la contraseña
        input.type = 'password';

        // Mostrar el icono de ojo abierto
        eye.style.display = 'inline';

        // Ocultar el icono de ojo tachado
        eyeSlash.style.display = 'none';
      }
    }


    // Función principal para iniciar sesión
    async function login(event) {

      // Evita que el formulario recargue la página
      if (event && event.preventDefault) {
        event.preventDefault();
      }

      // Obtener el valor del correo ingresado
      const email = document.getElementById('email').value.trim();

      // Obtener el valor de la contraseña
      const password = document.getElementById('password').value;

      // Validar que el correo tenga el dominio @booknest.com
      if (!email.endsWith('@booknest.com')) {
        alert('Solo se permiten correos con el dominio @booknest.com');
        return false;
      }

      // Validar que la contraseña no esté vacía
      if (!password) {
        alert('Ingresa tu contraseña');
        return false;
      }

      try {

        // Enviar datos al backend usando fetch
        const response = await fetch('http://localhost:3000/api/auth/login', {

          // Método HTTP
          method: 'POST',

          // Cabecera indicando que se envía JSON
          headers: {
            'Content-Type': 'application/json',
          },

          // Convertir los datos a JSON
          body: JSON.stringify({ correo: email, password }),
        });

        // Si la respuesta no es correcta
        if (!response.ok) {

          // Intentar obtener el mensaje de error del servidor
          const errorData = await response.json().catch(() => ({}));

          alert(errorData.error || 'Error al iniciar sesión. Verifica tus datos.');
          return false;
        }

        // Convertir la respuesta a JSON
        const data = await response.json();

        // Obtener el usuario desde la respuesta
        const usuario = data.user;

        // Validar que el usuario exista
        if (!usuario) {
          alert('No se pudo obtener la información del usuario.');
          return false;
        }

        // Guardar el usuario en el localStorage del navegador
        localStorage.setItem('usuarioActivo', JSON.stringify({
          ...usuario,

          // Inicializar historial de compras
          historial: [],

          // Inicializar carrito
          carrito: [],
        }));

        // Guardar el rol del usuario
        localStorage.setItem('rol', (usuario.rol || 'cliente').toLowerCase());

        // Mensaje de bienvenida
        alert(`Bienvenido ${usuario.nombre}`);

        // Obtener el rol del usuario
        const rol = (usuario.rol || 'cliente').toLowerCase();

        // Redirigir según el tipo de usuario
        if (rol === 'admin' || rol === 'administrador') {

          // Página de administrador
          window.location.href = 'admin.html';

        } else if (rol === 'empleado') {

          // Página de empleado
          window.location.href = 'empleado.html';

        } else {

          // Página de cliente
          window.location.href = 'cliente.html';
        }

      } catch (err) {

        // Mostrar error en consola
        console.error(err);

        // Mensaje si el servidor no responde
        alert('No se pudo contactar con el servidor. Asegúrate de que el backend esté encendido.');
      }

      // Evita que el formulario recargue la página
      return false;
    }

  </script>

</body>
</html>
