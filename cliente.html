<html lang="es">
<head>
  <meta charset="UTF-8">

<link rel="shortcut icon" href="img/BookNesticon.png" type="image/x-icon">
  <title>Booknest - Cliente</title>
  <link rel="stylesheet" href="styles.css"> 
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-solid-straight/css/uicons-solid-straight.css">

<body>

<!-- Botón para carrito -->
<header>

    Mi carrito 
    <ion-icon name="cart-outline"></ion-icon>
    <span id="contadorCarrito" class="contador-carrito">0</span>

<div class="layout">

<div class="buscador-wrapper">

  </button>
  <div id="buscadorPanel" class="buscador-panel">
    <input 
      type="text" 
      id="buscadorLibros"

</div>

    <ul>

        <span class="icon"><i class="fi fi-rr-books"></i></span>
        <span class="text">Catálogo</span>
      </li>

      <li class="menu-item" onclick="mostrarSeccion('sagas')">
        <span class="icon"><i class="fi fi-rr-books"></i></span>
        <span class="text">Sagas</span>
      </li>

        <span class="icon"><i class="fi fi-ss-heart"></i></span>
        <span class="text">Favoritos</span>
      </li>

      <li class="menu-item" onclick="verPerfil()">
        <span class="icon"><i class="fi fi-rr-user"></i></span>
        <span class="text">Perfil</span>
      </li>

      <li class="menu-item" onclick="volverAlLogin()">
        <span class="icon"><i class="fi fi-rr-exit"></i></span>

  </div>

  <!-- CONTENIDO -->

  <!-- CATÁLOGO -->

  <!-- FAVORITOS -->

    <h2>Libros Favoritos</h2>
    <div id="listaFavoritos" class="catalogo-libros"></div>
    <p id="sinFavoritos" style="display:none; margin-top:10px;">No tienes favoritos aún.</p>
  </div>

  <!-- MODAL CARRITO -->

              <th>Precio</th>

        <button onclick="pagarCarrito()" style="width:auto; padding:8px 16px;">Proceder al Pago</button>
        <button onclick="cerrarCarrito()" style="width:auto; padding:8px 16px;">Cerrar</button>

<script src="config.js"></script>
<script>
  const usuarioActivo = JSON.parse(localStorage.getItem("usuarioActivo"));
  if (!usuarioActivo || localStorage.getItem("rol") !== "cliente") {
    window.location.href = "index.html";
  }

  const API_BASE = window.API_BASE;
  let libros = [];

  function leerArrayLocalStorage(clave) {
    try {
      const raw = localStorage.getItem(clave);
      if (raw == null || raw === '') return [];
      const v = JSON.parse(raw);
      return Array.isArray(v) ? v : [];
    } catch {
      return [];
    }
  }

  let carrito = usuarioActivo ? leerArrayLocalStorage(`carrito_${usuarioActivo.usuario}`) : [];
  let historialCliente = usuarioActivo ? leerArrayLocalStorage(`historial_${usuarioActivo.usuario}`) : [];
  let transacciones = leerArrayLocalStorage('transacciones');
  let favoritos = usuarioActivo ? leerArrayLocalStorage(`favoritos_${usuarioActivo.usuario}`) : [];

  let accionPendiente = null;
  let libroSeleccionado = null;
  let indiceSeleccionado = null;
  let compraPendiente = null;
  let vistaSagas = false;

  let carruselHeroIndex = 0;
  let carruselHeroItems = [];
  let carruselAutoplayId = null;
  const CARRUSEL_AUTO_MS = 4000;
  const CARRUSEL_GAP_PX = 12;

  function escapeHtml(text) {
    if (text == null || text === '') return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function stopCarruselAutoplay() {
    if (carruselAutoplayId != null) {
      clearInterval(carruselAutoplayId);
      carruselAutoplayId = null;
    }
  }

  function startCarruselAutoplay() {
    stopCarruselAutoplay();
    if (carruselHeroItems.length <= 1) return;
    carruselAutoplayId = setInterval(() => {
      const n = carruselHeroItems.length;
      if (n === 0) return;
      goCarruselHero((carruselHeroIndex + 1) % n);
    }, CARRUSEL_AUTO_MS);
  }

  function carruselHeroNavigate(i) {
    const n = carruselHeroItems.length;
    if (n === 0) return;
    stopCarruselAutoplay();
    goCarruselHero(i);
    startCarruselAutoplay();
  }

  function goCarruselHero(i) {
    if (carruselHeroItems.length === 0) return;
    carruselHeroIndex = Math.max(0, Math.min(i, carruselHeroItems.length - 1));
    updateCarruselHeroTransform();
    updateCarruselDots();
  }

  function layoutCarruselHero() {
    const viewport = document.querySelector('.carrusel-hero-viewport');
    const track = document.getElementById('carruselHeroTrack');
    if (!viewport || !track) return;
    const slides = track.querySelectorAll(
      '.carrusel-hero-slide:not(.carrusel-hero-slide--empty):not(.carrusel-hero-slide--loading)',
    );
    if (slides.length === 0) return;
    const vw = viewport.getBoundingClientRect().width;
    const pct = window.matchMedia('(max-width: 640px)').matches ? 0.9 : 0.62;
    const slideW = Math.min(vw * pct, 720);
    slides.forEach((s) => {
      s.style.flex = `0 0 ${slideW}px`;
    });
    track.style.gap = `${CARRUSEL_GAP_PX}px`;
  }

  function updateCarruselHeroTransform() {
    const viewport = document.querySelector('.carrusel-hero-viewport');
    const track = document.getElementById('carruselHeroTrack');
    if (!track || !viewport || carruselHeroItems.length === 0) return;
    const first = track.querySelector(
      '.carrusel-hero-slide:not(.carrusel-hero-slide--empty):not(.carrusel-hero-slide--loading)',
    );
    if (!first) {
      track.style.transform = 'translateX(0)';
      return;
    }
    const slideW = first.getBoundingClientRect().width;
    const gap = CARRUSEL_GAP_PX;
    const vw = viewport.getBoundingClientRect().width;
    const step = slideW + gap;
    const offset = vw / 2 - slideW / 2 - carruselHeroIndex * step;
    track.style.transform = `translateX(${offset}px)`;
  }

  function updateCarruselDots() {
    document.querySelectorAll('#carruselHeroDots .carrusel-dot').forEach((d, i) => {
      d.classList.toggle('active', i === carruselHeroIndex);
    });
  }

  function reflowCarruselHero() {
    layoutCarruselHero();
    updateCarruselHeroTransform();
  }

  function renderCarruselHero() {
    stopCarruselAutoplay();
    const track = document.getElementById('carruselHeroTrack');
    const dots = document.getElementById('carruselHeroDots');
    const prev = document.getElementById('carruselPrev');
    const next = document.getElementById('carruselNext');
    if (!track || !dots) return;

    const maxSlides = 12;
    carruselHeroItems = libros.slice(0, Math.min(libros.length, maxSlides));
    carruselHeroIndex = 0;
    track.innerHTML = '';
    dots.innerHTML = '';
    track.style.width = '';

    if (carruselHeroItems.length === 0) {
      track.innerHTML =
        '<div class="carrusel-hero-slide carrusel-hero-slide--empty"><p>No hay libros para mostrar en el carrusel.</p></div>';
      track.style.gap = '0';
      track.style.transform = 'translateX(0)';
      if (prev) prev.disabled = true;
      if (next) next.disabled = true;
      return;
    }

    const n = carruselHeroItems.length;

    carruselHeroItems.forEach((libro, i) => {
      const slide = document.createElement('div');
      slide.className = 'carrusel-hero-slide carrusel-hero-slide--book';
      slide.dataset.index = String(i);
      const precio = libro.precio != null ? Number(libro.precio).toLocaleString('es-CO') : '0';
      const sinStock = libro.stock <= 0;
      slide.innerHTML = `
        <div class="carrusel-hero-cover">
          <img src="${libro.caratula || 'img/BookNest.png'}" alt="${escapeHtml(libro.titulo)}">
        </div>
        <div class="carrusel-hero-meta">
          <h3>${escapeHtml(libro.titulo)}</h3>
          <p class="carrusel-hero-autor">${escapeHtml(libro.autor || 'Autor desconocido')}</p>
          <p class="carrusel-hero-precio">$${precio}</p>
          <p class="carrusel-hero-stock">${sinStock ? 'Sin stock' : `Stock: ${libro.stock}`}</p>
          <div class="carrusel-hero-acciones">
            <button type="button" class="btn-fav btn-fav--carrusel" title="${estaEnFavoritos(libro.titulo) ? 'Remover de favoritos' : 'Agregar a favoritos'}"
              onclick="event.stopPropagation(); toggleFavorito('${encodeURIComponent(libro.titulo)}')">
              <i class="${estaEnFavoritos(libro.titulo) ? 'fi fi-ss-heart' : 'fi fi-rr-heart'}"></i>
            </button>
            <button type="button" class="btn-carrusel-carrito" ${sinStock ? 'disabled' : ''}
              onclick="agregarCarritoPorTitulo('${encodeURIComponent(libro.titulo)}')">
              <i class="fi fi-rr-shopping-cart"></i> Agregar al carrito
            </button>
          </div>
        </div>
      `;
      track.appendChild(slide);

      const dot = document.createElement('button');
      dot.type = 'button';
      dot.className = 'carrusel-dot' + (i === 0 ? ' active' : '');
      dot.setAttribute('aria-label', `Libro ${i + 1} de ${n}`);
      dot.addEventListener('click', () => carruselHeroNavigate(i));
      dots.appendChild(dot);
    });

    if (prev) prev.disabled = n <= 1;
    if (next) next.disabled = n <= 1;
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        reflowCarruselHero();
        startCarruselAutoplay();
      });
    });
  }

  async function cargarLibrosDesdeApi() {
    const contenedor = document.getElementById('catalogoLibros');
    const track = document.getElementById('carruselHeroTrack');
    if (contenedor) contenedor.innerHTML = '<p>Cargando libros…</p>';
    if (track) {
      track.innerHTML = '<div class="carrusel-hero-slide carrusel-hero-slide--loading"><p>Cargando destacados…</p></div>';
      track.style.transform = 'translateX(0)';
    }

    try {
      const controller = new AbortController();
      const to = setTimeout(() => controller.abort(), 20000);
      const res = await fetch(`${API_BASE}/api/libros`, { signal: controller.signal });
      clearTimeout(to);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error || 'Error al cargar el catálogo');
      }
      libros = Array.isArray(data.books) ? data.books : [];
    } catch (e) {
      console.error(e);
      libros = [];
      mostrarMensaje('error', 'No se pudieron cargar los libros. Verifica el servidor y la base de datos.');
      if (contenedor) {
        contenedor.innerHTML =
          '<p>No se pudo obtener el catálogo. Asegúrate de que la API esté en ejecución (npm run start en server).</p>';
      }
      try {
        renderCarruselHero();
      } catch (err2) {
        console.error(err2);
      }
      return;
    }

    const seccionSagas = document.getElementById('seccionSagas');
    const seccionFavoritos = document.getElementById('favoritosSeccion');
    try {
      renderCarruselHero();
      if (seccionSagas && seccionSagas.style.display !== 'none') {
        mostrarSagas();
      } else if (seccionFavoritos && seccionFavoritos.style.display !== 'none') {
        mostrarFavoritos();
      } else {
        mostrarLibrosCliente();
      }
    } catch (err) {
      console.error('Error al pintar catálogo o carrusel:', err);
      mostrarMensaje('error', 'Error al mostrar los libros. Revisa la consola o borra datos corruptos del navegador.');
      if (contenedor) {
        contenedor.innerHTML =
          '<p>No se pudo mostrar el catálogo. Prueba recargar la página o borrar el almacenamiento local de este sitio para favoritos/carrito.</p>';
      }
      try {
        renderCarruselHero();
      } catch (err2) {
        console.error(err2);
      }
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    const prev = document.getElementById('carruselPrev');
    const next = document.getElementById('carruselNext');
    if (prev) {
      prev.addEventListener('click', () => {
        const n = carruselHeroItems.length;
        if (n === 0) return;
        carruselHeroNavigate((carruselHeroIndex - 1 + n) % n);
      });
    }
    if (next) {
      next.addEventListener('click', () => {
        const n = carruselHeroItems.length;
        if (n === 0) return;
        carruselHeroNavigate((carruselHeroIndex + 1) % n);
      });
    }
    document.addEventListener('keydown', (e) => {
      if (e.target.matches('input, textarea')) return;
      const n = carruselHeroItems.length;
      if (n === 0) return;
      if (e.key === 'ArrowLeft') carruselHeroNavigate((carruselHeroIndex - 1 + n) % n);
      if (e.key === 'ArrowRight') carruselHeroNavigate((carruselHeroIndex + 1) % n);
    });
    window.addEventListener('pagehide', stopCarruselAutoplay);
    let carruselResizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(carruselResizeTimer);
      carruselResizeTimer = setTimeout(() => reflowCarruselHero(), 120);
    });

    const tablaCarritoEl = document.getElementById('tablaCarrito');
    if (tablaCarritoEl) {
      tablaCarritoEl.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-remove-cart-index]');
        if (!btn) return;
        e.preventDefault();
        e.stopPropagation();
        const idx = parseInt(btn.getAttribute('data-remove-cart-index'), 10);
        if (Number.isNaN(idx)) return;
        void eliminarDelCarrito(idx);
      });
    }

    (async () => {
      const libroPendiente = localStorage.getItem('libroPendiente');
      await cargarLibrosDesdeApi();
      if (libroPendiente) {
        agregarCarritoPorTitulo(encodeURIComponent(libroPendiente));
        localStorage.removeItem('libroPendiente');
      }
      mostrarCarrito();
      actualizarContadorCarrito();
    })();
  });

  function volverAlLogin() { localStorage.removeItem("rol"); window.location.href = "index.html"; }
  
  function toggleBuscador() {
    const panel = document.getElementById('buscadorPanel');
    if (!panel) return;
    panel.classList.toggle('visible');
    const input = document.getElementById('buscadorLibros');
    if (panel.classList.contains('visible') && input) input.focus();
  }

  function mostrarMensaje(tipo, mensaje) {
    const toast = document.createElement('div');
    toast.className = `toast ${tipo}`;
    toast.textContent = mensaje;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  function guardarDatos() {
    localStorage.setItem("transacciones", JSON.stringify(transacciones));
    if (usuarioActivo) {
      localStorage.setItem(`carrito_${usuarioActivo.usuario}`, JSON.stringify(carrito));
      localStorage.setItem(`historial_${usuarioActivo.usuario}`, JSON.stringify(historialCliente));

  const ICONOS_FRANQUICIA = {
    Visa: 'iconVisa',
    MasterCard: 'iconMasterCard',

    'Diners Club': 'iconDiners',

  function actualizarIconosMarcaTarjeta(tipoClave) {
    const onId = tipoClave ? ICONOS_FRANQUICIA[tipoClave] : null;
    Object.values(ICONOS_FRANQUICIA).forEach((id) => {

  /** BIN comunes: Visa, MC, Amex, Discover, Diners, JCB, UnionPay. */
  function tipoTarjetaDesdeDigitos(d) {
    if (!d || d.length < 2) return '';
    if (/^3[47]/.test(d)) return 'American Express';
    if (/^4/.test(d)) return 'Visa';
    if (/^5[1-5]/.test(d)) return 'MasterCard';
    if (d.length >= 4) {
      const p4 = parseInt(d.slice(0, 4), 10);
      if (!Number.isNaN(p4) && p4 >= 2221 && p4 <= 2720) return 'MasterCard';
    }
    if (/^6011/.test(d)) return 'Discover';
    if (/^65/.test(d)) return 'Discover';
    if (d.length >= 3) {
      const p3 = parseInt(d.slice(0, 3), 10);
      if (p3 >= 644 && p3 <= 649) return 'Discover';
    }
    if (/^36/.test(d)) return 'Diners Club';
    if (/^38/.test(d)) return 'Diners Club';
    if (d.length >= 3) {
      const p3 = parseInt(d.slice(0, 3), 10);
      if (p3 >= 300 && p3 <= 305) return 'Diners Club';
    }
    if (d.length >= 4) {
      const p4 = parseInt(d.slice(0, 4), 10);
      if (!Number.isNaN(p4) && p4 >= 3528 && p4 <= 3589) return 'JCB';
    }
    if (/^62/.test(d)) return 'UnionPay';
    return '';
  }

  function maxDigitosPAN(d) {
    if (/^3[47]/.test(d)) return 15;
    if (/^36/.test(d) || /^38/.test(d) || /^30[0-5]/.test(d)) return 14;
    return 19;
  }

  function longitudValidaParaFranquicia(d, tipo) {
    const len = d.length;
    if (!tipo) return len >= 13 && len <= 19;
    switch (tipo) {
      case 'American Express':
        return len === 15;
      case 'Diners Club':
        return len === 14 || len === 16;
      case 'Visa':
        return len === 13 || len === 16 || len === 19;
      case 'MasterCard':
      case 'JCB':
        return len === 16;
      case 'Discover':
        return len === 16 || len === 19;
      case 'UnionPay':
        return len >= 16 && len <= 19;
      default:
        return len >= 13 && len <= 19;
    }
  }

  /** Dígitos; longitud máxima según BIN; icono de franquicia. */
  function detectarTipoTarjeta(input) {
    let valor = input.value.replace(/\D/g, '');
    const max = maxDigitosPAN(valor);
    valor = valor.slice(0, max);
    input.maxLength = max;
    input.value = valor;
    const tipo = tipoTarjetaDesdeDigitos(valor);
    const mostrarIconoGenerico = valor.length >= 4 && !tipo;
    actualizarIconosMarcaTarjeta(tipo ? tipo : mostrarIconoGenerico ? 'Otra' : '');
    const tipoSpan = document.getElementById('tipoTarjeta');
    if (tipoSpan) {
      if (tipo) {
        tipoSpan.textContent = `Franquicia: ${tipo}`;
      } else if (valor.length >= 4) {
        tipoSpan.textContent = 'Franquicia no reconocida; se validará con el número completo (Luhn).';
      } else if (valor.length) {
        tipoSpan.textContent = 'Sigue escribiendo el número…';
      } else {
        tipoSpan.textContent = '';
      }
    }
  }

  function esTarjetaAceptada(d) {
    const tipo = tipoTarjetaDesdeDigitos(d);
    return longitudValidaParaFranquicia(d, tipo);
  }

  function actualizarMensajeVencimiento() {
    const el = document.getElementById('expiracion');
    const msg = document.getElementById('vencimientoMensaje');
    if (!el || !msg) return;
    const v = el.value.trim();
    msg.className = 'checkout-exp-hint';
    if (v.length === 0) {
      msg.textContent = '';
      return;
    }
    const m = /^(\d{2})\/(\d{2})$/.exec(v);
    if (!m) {
      msg.textContent = v.length >= 2 ? 'Usa el formato MM/AA' : '';
      if (v.length >= 2) msg.classList.add('is-error');
      return;
    }
    const mes = parseInt(m[1], 10);
    const aa = parseInt(m[2], 10);
    if (mes < 1 || mes > 12) {
      msg.textContent = 'Mes inválido (use 01 a 12).';
      msg.classList.add('is-error');
      return;
    }
    const anio = 2000 + aa;
    const ahora = new Date();
    const y = ahora.getFullYear();
    const mo = ahora.getMonth() + 1;
    const vigente = anio > y || (anio === y && mes >= mo);
    if (!vigente) {
      msg.textContent = 'Esta tarjeta está vencida. No puedes usarla para pagar.';
      msg.classList.add('is-error');
      return;
    }
    msg.textContent = 'Fecha de vencimiento válida.';
    msg.classList.add('is-ok');
  }

  /** Algoritmo de Luhn. */
  function validarLuhn(digitos) {
    const s = String(digitos).replace(/\D/g, '');
    if (!s) return false;
    let sum = 0;
    let doble = false;
    for (let i = s.length - 1; i >= 0; i--) {
      let n = parseInt(s.charAt(i), 10);
      if (Number.isNaN(n)) return false;
      if (doble) {
        n *= 2;
        if (n > 9) n -= 9;
      }
      sum += n;
      doble = !doble;
    }
    return sum % 10 === 0;
  }

  /** MM/AA: mes válido y no vencida (válida hasta fin de mes). */
  function validarVencimientoMmAa(mmYy) {
    const m = /^(\d{2})\/(\d{2})$/.exec(String(mmYy).trim());
    if (!m) return false;
    const mes = parseInt(m[1], 10);
    const aa = parseInt(m[2], 10);
    if (mes < 1 || mes > 12) return false;
    const anio = 2000 + aa;
    const ahora = new Date();
    const y = ahora.getFullYear();
    const mo = ahora.getMonth() + 1;
    if (anio > y) return true;
    if (anio === y && mes >= mo) return true;
    return false;
  }

  // Agrega el libro al carrito por título (funciona con libros ordenados o filtrados)
  async function agregarCarritoPorTitulo(tituloCodificado) {

  const titulo = decodeURIComponent(tituloCodificado);

  const libro = libros.find(l => l.titulo === titulo);

  if (!libro) {
    mostrarMensaje('error', 'Libro no encontrado');
    return;
  }

  if (libro.stock <= 0) {
    mostrarMensaje('error', 'No hay stock disponible');
    return;
  }

  const existente = carrito.find(item => item.titulo === libro.titulo);

  if (existente) {
    existente.cantidad++;
    if (existente.libroId == null) existente.libroId = libro.id;
  } else {
    carrito.push({
      titulo: libro.titulo,
      precio: libro.precio,
      cantidad: 1,
      libroId: libro.id,
    });
  }

  let guardadoEnServidor = false;
  try {
    if (!usuarioActivo || !usuarioActivo.id) {
      throw new Error('SIN_USUARIO_ID');
    }

    const res = await fetch(`${API_BASE}/api/carrito/agregar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        usuarioId: usuarioActivo.id,
        libroId: libro.id,
        cantidad: 1,
      }),
    });

    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      throw new Error(data.error || 'Error al guardar el carrito en base de datos.');
    }
    guardadoEnServidor = true;
  } catch (err) {
    console.error(err);
    let msg =
      'Se agregó en este navegador, pero no se guardó en el servidor.';
    if (err.message === 'SIN_USUARIO_ID') {
      msg += ' Cierra sesión y vuelve a entrar (falta id de usuario).';
    } else if (
      location.protocol === 'https:' &&
      String(API_BASE).toLowerCase().startsWith('http:')
    ) {
      msg +=
        ' La página es HTTPS y la API está en HTTP (p. ej. localhost): el navegador lo bloquea. Edita config.js y pon la URL HTTPS de tu API publicada.';
    } else if (
      err.name === 'TypeError' ||
      String(err.message || '').toLowerCase().includes('failed to fetch')
    ) {
      msg +=
        ' No hay conexión con la API: ¿servidor en marcha y config.js con la URL correcta?';
    } else if (err.message && err.message !== 'SIN_USUARIO_ID') {
      msg += ' ' + err.message;
    }
    mostrarMensaje('error', msg);
  }

  guardarDatos();
  mostrarCarrito();
  actualizarContadorCarrito();
  if (guardadoEnServidor) {
    mostrarMensaje('success', 'Agregado al carrito');
  }
}

  function mostrarCarrito() {
    const tbody = document.querySelector("#tablaCarrito tbody");
    if (!tbody) return;
    tbody.replaceChildren();
    if (carrito.length === 0) {
      const tr = document.createElement('tr');
      const td = document.createElement('td');
      td.colSpan = 5;
      td.textContent = 'El carrito está vacío';
      tr.appendChild(td);
      tbody.appendChild(tr);
    } else {
      carrito.forEach((item, i) => {
        const precio = Number(item.precio) || 0;
        const cantidad = Number(item.cantidad) || 0;
        const total = precio * cantidad;
        const tr = document.createElement('tr');
        const tdLibro = document.createElement('td');
        tdLibro.textContent = item.titulo ?? '';
        const tdCant = document.createElement('td');
        tdCant.textContent = String(cantidad);
        const tdPrecio = document.createElement('td');
        tdPrecio.textContent = '$' + precio.toFixed(2);
        const tdTotal = document.createElement('td');
        tdTotal.textContent = '$' + total.toFixed(2);
        const tdAcc = document.createElement('td');
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = 'Eliminar';
        btn.setAttribute('data-remove-cart-index', String(i));
        btn.className = 'btn-eliminar-carrito';
        tdAcc.appendChild(btn);
        tr.append(tdLibro, tdCant, tdPrecio, tdTotal, tdAcc);
        tbody.appendChild(tr);
      });
    }
    actualizarContadorCarrito();
  }

  async function eliminarDelCarrito(i) {
    if (i < 0 || i >= carrito.length) return;
    const item = carrito[i];
    const libroId =
      item.libroId != null
        ? item.libroId
        : (libros.find((l) => l.titulo === item.titulo) || {}).id;

    carrito.splice(i, 1);
    guardarDatos();
    mostrarCarrito();

    if (usuarioActivo && usuarioActivo.id && libroId) {
      try {
        const res = await fetch(`${API_BASE}/api/carrito/eliminar`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            usuarioId: usuarioActivo.id,
            libroId,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          mostrarMensaje('error', data.error || 'No se pudo actualizar la base de datos.');
        }
      } catch (err) {
        console.error(err);
        mostrarMensaje('error', 'No se pudo sincronizar con el servidor; el carrito ya se actualizó aquí.');
      }
    }
  }

    if (tarjetaEl) {
      tarjetaEl.value = '';
      tarjetaEl.maxLength = 19;
    }
    document.getElementById('expiracion').value = '';
    document.getElementById('titular').value = '';
    document.getElementById('tipoTarjeta').textContent = '';
    const vm = document.getElementById('vencimientoMensaje');
    if (vm) {
      vm.textContent = '';
      vm.className = 'checkout-exp-hint';
    }
    actualizarIconosMarcaTarjeta('');
  }

  function formatoExpiracion(input) {
    let v = input.value.replace(/\D/g, '');
    if (v.length > 2) v = v.slice(0, 2) + '/' + v.slice(2, 4);
    input.value = v;
    actualizarMensajeVencimiento();
  }

  function construirItemsVenta() {
    if (compraPendiente && compraPendiente.carrito) {
      return carrito.map((item) => {
        const libroId =
          item.libroId != null
            ? item.libroId
            : (libros.find((l) => l.titulo === item.titulo) || {}).id;
        const cantidad = Number(item.cantidad) || 0;
        if (!libroId || cantidad <= 0) {
          throw new Error(`No se pudo identificar el libro en el carrito: ${item.titulo || ''}`);
        }
        return { libroId, cantidad };
      });
    }
    if (compraPendiente && compraPendiente.libro) {
      const { libro, cantidad } = compraPendiente;
      const q = Number(cantidad) || 0;
      if (!libro || !libro.id || q <= 0) {
        throw new Error('Compra inválida: falta el libro o la cantidad.');
      }
      return [{ libroId: libro.id, cantidad: q }];
    }
    return null;
  }

  function aplicarStockUpdates(updates) {
    if (!Array.isArray(updates)) return;
    updates.forEach((u) => {
      const id = u.libroId != null ? Number(u.libroId) : NaN;
      const L = libros.find((l) => Number(l.id) === id);
      if (L && u.stock != null) L.stock = Number(u.stock);
    });
  }

  async function finishPurchase() {
    if (!usuarioActivo) {
      alert('Debes estar logueado para realizar una compra');
      return false;
    }
    if (!usuarioActivo.id) {
      alert('Sesión sin id de usuario. Cierra sesión y vuelve a entrar.');
      return false;
    }

    const tarjetaRaw = document.getElementById('tarjeta').value.replace(/\D/g, '');
    const expiracion = document.getElementById('expiracion').value.trim();
    const titular = document.getElementById('titular').value.trim();

    if (!esTarjetaAceptada(tarjetaRaw)) {
      mostrarMensaje(
        'error',
        'Revisa el número: la cantidad de dígitos no coincide con la franquicia (ej. Visa 13/16/19, Amex 15, Diners 14…).',
      );
      return false;
    }
    if (!validarLuhn(tarjetaRaw)) {
      mostrarMensaje('error', 'El número de tarjeta no es válido (comprueba el dígito de control).');
      return false;
    }
    if (!validarVencimientoMmAa(expiracion)) {
      mostrarMensaje('error', 'Revisa la fecha MM/AA: inválida o la tarjeta está vencida.');
      return false;
    }
    if (titular.length < 2) {
      mostrarMensaje('error', 'Indica el nombre del titular.');
      return false;
    }

    let itemsPayload;
    try {
      itemsPayload = construirItemsVenta();
    } catch (e) {
      console.error(e);
      mostrarMensaje('error', e.message || 'No se pudo preparar la venta.');
      return false;
    }
    if (!itemsPayload || itemsPayload.length === 0) {
      alert('No hay compra pendiente');
      return false;
    }

    const nombreCliente = usuarioActivo.nombre;
    const correoCliente = usuarioActivo.correo;
    const fecha = new Date().toLocaleString();

    let data;
    try {
      const res = await fetch(`${API_BASE}/api/ventas/checkout`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          usuarioId: usuarioActivo.id,
          clienteNombre: nombreCliente,
          clienteCorreo: correoCliente,
          items: itemsPayload,
        }),
      });
      data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error || 'No se pudo registrar la venta en el servidor.');
      }
    } catch (e) {
      console.error(e);
      mostrarMensaje('error', e.message || 'Error de conexión al registrar la venta.');
      return false;
    }

    aplicarStockUpdates(data.stockUpdates);
    try {
      renderCarruselHero();
    } catch (e) {
      console.error(e);
    }

    const detalleApi = Array.isArray(data.detalle) ? data.detalle : [];
    const detalleFactura = detalleApi.map((d) => ({
      titulo: d.titulo,
      cantidad: d.cantidad,
      precio: d.precio,
    }));
    const totalFactura =
      typeof data.total === 'number'
        ? data.total
        : detalleFactura.reduce((sum, item) => sum + item.precio * item.cantidad, 0);

    if (compraPendiente && compraPendiente.carrito) {
      carrito = [];
    } else if (compraPendiente && compraPendiente.libro) {
      compraPendiente = null;
    }

    guardarDatos();

    const tipoTarjeta = tipoTarjetaDesdeDigitos(tarjetaRaw) || '—';
    const ultimos4 = tarjetaRaw.slice(-4);

    const nuevaFactura = {
      id: data.ventaId != null ? data.ventaId : Date.now(),
      cliente: nombreCliente,
      correo: correoCliente,
      fecha,
      detalle: detalleFactura,
      total: totalFactura,
      tarjetaTipo: tipoTarjeta,
      tarjetaUltimos4: ultimos4,
    };

    const facturas = JSON.parse(localStorage.getItem(`facturas_${usuarioActivo.usuario}`)) || [];
    facturas.push(nuevaFactura);
    localStorage.setItem(`facturas_${usuarioActivo.usuario}`, JSON.stringify(facturas));

    transacciones.push({
      fecha,
      usuario: nombreCliente,
      correo: correoCliente,
      tipo: 'venta',
      libro: detalleFactura.map((d) => d.titulo).join(', '),
      total: totalFactura,
      detalle: detalleFactura,
    });
    localStorage.setItem('transacciones', JSON.stringify(transacciones));

    detalleFactura.forEach((item) => {
      historialCliente.push({ fecha, libro: item.titulo, tipo: 'Compra', estado: 'Completada' });
    });
    localStorage.setItem(`historial_${usuarioActivo.usuario}`, JSON.stringify(historialCliente));

    let facturasGlobales = JSON.parse(localStorage.getItem('facturas')) || [];
    facturasGlobales.push(nuevaFactura);
    localStorage.setItem('facturas', JSON.stringify(facturasGlobales));

    actualizarVistaActual();
    mostrarCarrito();
    cerrarCheckout();
    mostrarFacturasGuardadas();
    actualizarContadorCarrito();
    mostrarMensaje('success', 'Compra registrada en base de datos y factura generada.');
    compraPendiente = null;

    return false;
  }

  function verPerfil(){ window.location.href="usuario.html"; }

  const botonMenu=document.getElementById('botonMenu');
  const menuOpciones=document.getElementById('menuOpciones');
  if (botonMenu && menuOpciones) {
    botonMenu.addEventListener('click', e=>{ e.stopPropagation(); menuOpciones.style.display = menuOpciones.style.display==='flex'?'none':'flex'; });
    window.addEventListener('click',()=>{ menuOpciones.style.display='none'; });
  }

  function actualizarContadorCarrito(){
    const contador=document.getElementById("contadorCarrito");
    if(!contador) return;
    const totalItems=carrito.reduce((total,item)=>total+(item.cantidad||1),0);
    contador.textContent=totalItems>0?totalItems:0;
  }

  function toggleFacturas(){
    const seccionTabla=document.getElementById('tablaFacturasCliente');
    if (!seccionTabla) return;
    seccionTabla.style.display = seccionTabla.style.display==='table'?'none':'table';
    mostrarFacturasGuardadas();
  }

  function mostrarFacturasGuardadas(){
    const tbody=document.querySelector("#tablaFacturasCliente tbody");
    if (!tbody) return;
    const facturas = JSON.parse(localStorage.getItem(`facturas_${usuarioActivo.usuario}`)) || [];
    tbody.innerHTML="";
    if(facturas.length===0) tbody.innerHTML="<tr><td colspan='4'>No hay facturas</td></tr>";
    else facturas.forEach((f,i)=>{
      tbody.innerHTML+=`<tr>
        <td>${f.id}</td><td>${f.fecha}</td><td>$${f.total.toFixed(2)}</td>
        <td><button onclick="verFactura(${i})">Ver</button></td>
      </tr>`;
    });
  }

  function verFactura(indice){
    const facturas=JSON.parse(localStorage.getItem(`facturas_${usuarioActivo.usuario}`))||[];
    if(!facturas[indice]) return;
    const f=facturas[indice];
    document.getElementById('facturaCliente').textContent=f.cliente;
    document.getElementById('facturaCorreo').textContent=f.correo;
    document.getElementById('facturaFecha').textContent=f.fecha;
    document.getElementById('facturaTipo').textContent=f.tarjetaTipo;
    document.getElementById('facturaUltimos4').textContent=f.tarjetaUltimos4;
    const tbody=document.getElementById('facturaTabla'); tbody.innerHTML="";
    f.detalle.forEach(d=>{ tbody.innerHTML+=`<tr>
      <td>${d.titulo}</td><td>${d.cantidad}</td><td>$${d.precio.toFixed(2)}</td><td>$${(d.cantidad*d.precio).toFixed(2)}</td>
    </tr>`; });
    document.getElementById('facturaTotal').textContent=f.total.toFixed(2);
    document.getElementById('modalFactura').style.display='flex';
  }

  function cerrarModalFactura(){ document.getElementById('modalFactura').style.display='none'; }


function buscarLibros() {
  const texto = document.getElementById("buscadorLibros").value.toLowerCase();
  
  // Determinar en qué sección estamos
  const seccionCatalogo = document.getElementById('seccionCatalogo');
  const seccionSagas = document.getElementById('seccionSagas');
  
  if (!texto) {
    // Si el input queda vacío, mostrar la sección actual completamente
    if (seccionSagas.style.display !== 'none') {
      mostrarSagas();
    } else {
      mostrarLibrosCliente();
    }
    return;
  }

  const filtrados = obtenerLibrosOrdenados().filter(libro =>
    libro.titulo.toLowerCase().includes(texto) ||
    (libro.autor || '').toLowerCase().includes(texto)
  );

  // Si estamos en sagas, mostrar filtrados en sagas
  if (seccionSagas.style.display !== 'none') {
    mostrarLibrosFiltradosSagas(filtrados);
  } else {
    // Si estamos en catálogo, mostrar filtrados en catálogo
    mostrarLibrosFiltradosCatalogo(filtrados);
  }
}

function mostrarLibrosFiltradosCatalogo(filtrados) {
  const contenedor = document.getElementById("catalogoLibros");
  contenedor.innerHTML = "";

  if (filtrados.length === 0) {
    contenedor.innerHTML = "<p>No se encontraron libros</p>";
    return;
  }

  filtrados.forEach((libro) => {
    const carta = document.createElement("div");
    carta.className = "carta-libro";

    carta.innerHTML = `
      <img src="${libro.caratula || 'img/BookNest.png'}">
      <h3>${libro.titulo}</h3>
      <p>Autor: ${libro.autor}</p>
      <p>Estado: ${libro.estado}</p>
      <p>$${libro.precio ? libro.precio.toLocaleString('es-CO') : '0'}</p>
      <p>Stock: ${libro.stock}</p>
      <div class="carta-botones">
        <button class="btn-fav" title="${estaEnFavoritos(libro.titulo) ? 'Remover de favoritos' : 'Agregar a favoritos'}" onclick="event.stopPropagation(); toggleFavorito('${encodeURIComponent(libro.titulo)}')">
          <i class="${estaEnFavoritos(libro.titulo) ? 'fi fi-ss-heart' : 'fi fi-rr-heart'}"></i>
        </button>
        <button onclick="agregarCarritoPorTitulo('${encodeURIComponent(libro.titulo)}')">
          <i class="fi fi-rr-shopping-cart"></i> Agregar al Carrito
        </button>
      </div>
    `;
    contenedor.appendChild(carta);
  });
}

function mostrarLibrosFiltradosSagas(filtrados) {
  const contenedor = document.getElementById("sagasContainer");
  contenedor.innerHTML = "";

  if (filtrados.length === 0) {
    contenedor.innerHTML = "<p>No se encontraron libros</p>";
    return;
  }

  // Agrupar por sagas los filtrados
  const sagas = {};
  const librosSinSaga = [];
  
  filtrados.forEach(libro => {
    if (libro.saga && libro.saga.trim()) {
      if (!sagas[libro.saga]) sagas[libro.saga] = [];
      sagas[libro.saga].push(libro);
    } else {
      librosSinSaga.push(libro);
    }
  });

  // Ordenar sagas alfabéticamente
  const sagasOrdenadas = Object.keys(sagas).sort((a, b) => a.localeCompare(b));

  // Mostrar sagas filtradas
  sagasOrdenadas.forEach((saga) => {
    const librosSaga = sagas[saga];
    const seccionSaga = document.createElement("div");
    seccionSaga.className = "seccion-saga";
    
    const titulo = document.createElement("h3");
    titulo.textContent = saga;
    seccionSaga.appendChild(titulo);

    const contenedorLibros = document.createElement("div");
    contenedorLibros.className = "saga-libros";

    librosSaga.sort((a, b) => a.titulo.localeCompare(b.titulo)).forEach((libro) => {
      const carta = document.createElement("div");
      carta.className = "carta-libro";

      carta.innerHTML = `
        <img src="${libro.caratula || 'img/BookNest.png'}">
        <h3>${libro.titulo}</h3>
        <p>Autor: ${libro.autor}</p>
        <p>Estado: ${libro.estado}</p>
        <p>$${libro.precio ? libro.precio.toLocaleString('es-CO') : '0'}</p>
        <p>Stock: ${libro.stock}</p>
        <div class="carta-botones">
          <button class="btn-fav" title="${estaEnFavoritos(libro.titulo) ? 'Remover de favoritos' : 'Agregar a favoritos'}" onclick="event.stopPropagation(); toggleFavorito('${encodeURIComponent(libro.titulo)}')">
            <i class="${estaEnFavoritos(libro.titulo) ? 'fi fi-ss-heart' : 'fi fi-rr-heart'}"></i>
          </button>
          <button onclick="agregarCarritoPorTitulo('${encodeURIComponent(libro.titulo)}')">
            <i class="fi fi-rr-shopping-cart"></i> Agregar al Carrito
          </button>
        </div>
      `;
      contenedorLibros.appendChild(carta);
    });

    seccionSaga.appendChild(contenedorLibros);
    contenedor.appendChild(seccionSaga);
  });

  // Mostrar libros sin saga (si existen)
  if (librosSinSaga.length > 0) {
    const seccionSinSaga = document.createElement("div");
    seccionSinSaga.className = "seccion-saga";
    
    const titulo = document.createElement("h3");
    titulo.textContent = "Otros Libros";
    seccionSinSaga.appendChild(titulo);

    const contenedorLibros = document.createElement("div");
    contenedorLibros.className = "saga-libros";

    librosSinSaga.sort((a, b) => a.titulo.localeCompare(b.titulo)).forEach((libro) => {
      const carta = document.createElement("div");
      carta.className = "carta-libro";

      carta.innerHTML = `
        <img src="${libro.caratula || 'img/BookNest.png'}">
        <h3>${libro.titulo}</h3>
        <p>Autor: ${libro.autor}</p>
        <p>Estado: ${libro.estado}</p>
        <p>$${libro.precio ? libro.precio.toLocaleString('es-CO') : '0'}</p>
        <p>Stock: ${libro.stock}</p>
        <div class="carta-botones">
          <button class="btn-fav" title="${estaEnFavoritos(libro.titulo) ? 'Remover de favoritos' : 'Agregar a favoritos'}" onclick="event.stopPropagation(); toggleFavorito('${encodeURIComponent(libro.titulo)}')">
            <i class="${estaEnFavoritos(libro.titulo) ? 'fi fi-ss-heart' : 'fi fi-rr-heart'}"></i>
          </button>
          <button onclick="agregarCarritoPorTitulo('${encodeURIComponent(libro.titulo)}')">
            <i class="fi fi-rr-shopping-cart"></i> Agregar al Carrito
          </button>
        </div>
      `;
      contenedorLibros.appendChild(carta);
    });

    seccionSinSaga.appendChild(contenedorLibros);
    contenedor.appendChild(seccionSinSaga);
  }
}
