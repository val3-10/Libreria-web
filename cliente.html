<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Booknest - Cliente</title>
  <link rel="stylesheet" href="styles.css"> 
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-solid-straight/css/uicons-solid-straight.css">
<link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css">
<link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css">
</head>
<body>
 
<!-- Botón para carrito -->
<header>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <button onclick="abrirCarrito()" class="btn-carrito">
    Mi carrito 
    <ion-icon name="cart-outline"></ion-icon>
    <span id="contadorCarrito" class="contador-carrito">0</span>
  </button>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2 class="logo">
      <i class="fi fi-ss-book-open-cover"></i>
    </h2>

<div class="buscador-wrapper">
  <button id="toggleBuscador" class="btn-toggle-buscador" onclick="toggleBuscador()">
    <i class="fi fi-rr-search"></i>
    <span class="buscador-text">Buscar</span>
  </button>
  <div id="buscadorPanel" class="buscador-panel">
    <input 
      type="text" 
      id="buscadorLibros" 
      placeholder="Buscar libro por título o autor..." 
      oninput="buscarLibros()"
    >
  </div>
</div>

    <ul>

      <li class="menu-item" onclick="mostrarSeccion('catalogo')">
        <span class="icon"><i class="fi fi-rr-books"></i></span>
        <span class="text">Catálogo</span>
      </li>

      <li class="menu-item" onclick="mostrarSeccion('sagas')">
        <span class="icon"><i class="fi fi-rr-books"></i></span>
        <span class="text">Sagas</span>
      </li>

      <li class="menu-item" onclick="toggleFavoritos()">
        <span class="icon"><i class="fi fi-ss-heart"></i></span>
        <span class="text">Favoritos</span>
      </li>

      <li class="menu-item" onclick="verPerfil()">
        <span class="icon"><i class="fi fi-rr-user"></i></span>
        <span class="text">Perfil</span>
      </li>

      <li class="menu-item" onclick="volverAlLogin()">
        <span class="icon"><i class="fi fi-rr-exit"></i></span>
        <span class="text">Salir</span>
      </li>

    </ul>
  </div>

  <!-- CONTENIDO -->
  <div class="main-content">

  <!-- CATÁLOGO -->
  <div id="seccionCatalogo" class="seccion">
    <h2>Catálogo de Libros</h2>
     <div id="galeriaDestacados" class="galeria-destacados"></div>

    <div id="catalogoLibros" class="catalogo-libros"></div>
  </div>

  <!-- SAGAS -->
  <div id="seccionSagas" class="seccion" style="display: none;">
    <h2>Sagas</h2>
    <div id="sagasContainer" class="sagas-container"></div>
  </div>

  <!-- FAVORITOS -->
  <div id="favoritosSeccion" class="seccion" style="display: none;">
    <h2>Libros Favoritos</h2>
    <div id="listaFavoritos" class="catalogo-libros"></div>
    <p id="sinFavoritos" style="display:none; margin-top:10px;">No tienes favoritos aún.</p>
  </div>

  <!-- MODAL CARRITO -->
  <div id="modalCarrito" class="modal">
    <div class="modal-contenido" style="width: 700px; max-height: 700px;">
      <h3>Carrito de Compras</h3>
      <div style="max-height: 500px; overflow-y: auto;">
        <table id="tablaCarrito">
          <thead>
            <tr>
              <th>Libro</th>
              <th>Cantidad</th>
              <th>Precio</th>
              <th>Total</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div style="text-align: right; margin-top: 10px;">
        <button onclick="pagarCarrito()" style="width:auto; padding:8px 16px;">Proceder al Pago</button>
        <button onclick="cerrarCarrito()" style="width:auto; padding:8px 16px;">Cerrar</button>
      </div>
    </div>
  </div>

  <!-- MODAL para ingresar cantidad -->
  <div id="modalCantidad" class="modal">
    <div class="modal-contenido">
      <h3 id="modalTitulo"></h3>
      <p id="modalSub"></p>
      <input type="number" id="cantidadInput" min="1">
      <div class="modal-botones">
        <button onclick="confirmarCantidad()">Aceptar</button>
        <button onclick="cerrarModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- PORTAL DE PAGO -->
  <div id="checkout" class="modal">
    <div class="modal-contenido">
      <h3>Portal de Pago</h3>
      <form>
        <input type="text" id="tarjeta" placeholder="Número de tarjeta" maxlength="16" oninput="detectarTipoTarjeta(this)">
        <small id="tipoTarjeta" style="display:block; margin-top:5px; font-weight:bold;"></small>

        <input type="text" id="expiracion" placeholder="MM/AA" maxlength="5" oninput="formatoExpiracion(this)"><br>
        <input type="text" id="cvv" placeholder="CVV" maxlength="3" oninput="soloNumeros(this)"><br>
        <input type="text" id="titular" placeholder="Nombre del titular"><br>

        <div class="modal-botones">
          <button type="button" onclick="finishPurchase()">Pagar</button>
          <button type="button" onclick="cerrarCheckout()">Cerrar</button>
        </div>
      </form>
    </div>
  </div>

 

<script>
  const usuarioActivo = JSON.parse(localStorage.getItem("usuarioActivo"));
  if (!usuarioActivo || localStorage.getItem("rol") !== "cliente") {
    window.location.href = "index.html";
  }
  let libros = JSON.parse(localStorage.getItem("libros")) || [];
  let carrito = usuarioActivo ? (JSON.parse(localStorage.getItem(`carrito_${usuarioActivo.usuario}`)) || []) : [];
  let historialCliente = usuarioActivo ? (JSON.parse(localStorage.getItem(`historial_${usuarioActivo.usuario}`)) || []) : [];
  let transacciones = JSON.parse(localStorage.getItem("transacciones")) || [];
  let favoritos = usuarioActivo ? (JSON.parse(localStorage.getItem(`favoritos_${usuarioActivo.usuario}`)) || []) : [];

  let accionPendiente = null;
  let libroSeleccionado = null;
  let indiceSeleccionado = null;
  let compraPendiente = null;
  let vistaSagas = false;

  document.addEventListener("DOMContentLoaded", () => {
     mostrarGaleriaDestacados();
    mostrarLibrosCliente();
    mostrarCarrito();
    actualizarContadorCarrito();
  });

  function volverAlLogin() { localStorage.removeItem("rol"); window.location.href = "index.html"; }
  
  function toggleBuscador() {
    const panel = document.getElementById('buscadorPanel');
    if (!panel) return;
    panel.classList.toggle('visible');
    const input = document.getElementById('buscadorLibros');
    if (panel.classList.contains('visible') && input) input.focus();
  }

  function mostrarMensaje(tipo, mensaje) {
    const toast = document.createElement('div');
    toast.className = `toast ${tipo}`;
    toast.textContent = mensaje;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  function guardarDatos() {
    localStorage.setItem("libros", JSON.stringify(libros));
    localStorage.setItem("transacciones", JSON.stringify(transacciones));
    if (usuarioActivo) {
      localStorage.setItem(`carrito_${usuarioActivo.usuario}`, JSON.stringify(carrito));
      localStorage.setItem(`historial_${usuarioActivo.usuario}`, JSON.stringify(historialCliente));
      localStorage.setItem(`favoritos_${usuarioActivo.usuario}`, JSON.stringify(favoritos));
    }
  }

  function detectarTipoTarjeta(input) {
    const valor = input.value.replace(/\D/g, "");
    const tipoSpan = document.getElementById("tipoTarjeta");
    let tipo = "";

    if (/^4/.test(valor)) tipo = "Visa";
    else if (/^5[1-5]/.test(valor)) tipo = "MasterCard";
    else if (/^3[47]/.test(valor)) tipo = "American Express";
    else if (/^6(?:011|5)/.test(valor)) tipo = "Discover";
    else if (/^35(2[89]|[3-8][0-9])/.test(valor)) tipo = "JCB";
    else if (/^3(?:0[0-5]|[68])/.test(valor)) tipo = "Diners Club";
    else tipo = "";

    tipoSpan.textContent = tipo ? `💳 ${tipo}` : "";
  }

  function estaEnFavoritos(titulo) {
    return favoritos.includes(titulo);
  }

  // Función para actualizar la vista según la sección actual
  function actualizarVistaActual() {
    const seccionCatalogo = document.getElementById('seccionCatalogo');
    const seccionSagas = document.getElementById('seccionSagas');
    const seccionFavoritos = document.getElementById('favoritosSeccion');
    
    if (seccionCatalogo.style.display !== 'none') {
      mostrarLibrosCliente();
    } else if (seccionSagas.style.display !== 'none') {
      mostrarSagas();
    } else if (seccionFavoritos.style.display !== 'none') {
      mostrarFavoritos();
    }
  }

  function toggleFavorito(tituloCodificado) {
    const titulo = decodeURIComponent(tituloCodificado);
    const index = favoritos.indexOf(titulo);

    if (index >= 0) {
      favoritos.splice(index, 1);
      mostrarMensaje('success', `"${titulo}" eliminado de favoritos`);
    } else {
      favoritos.push(titulo);
      mostrarMensaje('success', `"${titulo}" agregado a favoritos`);
    }

    guardarDatos();
    // Actualizar la vista actual en lugar de solo mostrar catálogo
    actualizarVistaActual();
  }

  function toggleFavoritos() {
    mostrarSeccion('favoritos');
  }

  function mostrarSeccion(tipo) {
    const seccionCatalogo = document.getElementById('seccionCatalogo');
    const seccionSagas = document.getElementById('seccionSagas');
    const seccionFavoritos = document.getElementById('favoritosSeccion');
    
    // Ocultar todas las secciones primero
    if (seccionCatalogo) seccionCatalogo.style.display = 'none';
    if (seccionSagas) seccionSagas.style.display = 'none';
    if (seccionFavoritos) seccionFavoritos.style.display = 'none';
    
    // Mostrar solo la sección seleccionada
    if (tipo === 'catalogo') {
      if (seccionCatalogo) seccionCatalogo.style.display = 'block';
      mostrarLibrosCliente();
    } else if (tipo === 'sagas') {
      if (seccionSagas) seccionSagas.style.display = 'block';
      mostrarSagas();
    } else if (tipo === 'favoritos') {
      if (seccionFavoritos) seccionFavoritos.style.display = 'block';
      mostrarFavoritos();
    }
  }

  function mostrarFavoritos() {
    const contenedor = document.getElementById('listaFavoritos');
    const sinFav = document.getElementById('sinFavoritos');
    if (!contenedor || !sinFav) return;

    const favoritosLibros = libros.filter(libro => favoritos.includes(libro.titulo));
    contenedor.innerHTML = '';

    if (favoritosLibros.length === 0) {
      sinFav.style.display = 'block';
      contenedor.innerHTML = '';
      return;
    }

    sinFav.style.display = 'none';
    favoritosLibros.forEach(libro => {
      const card = document.createElement('div');
      card.className = 'carta-libro';
      card.innerHTML = `
        <img src="${libro.caratula || 'img/BookNest.png'}"> 
        <h3>${libro.titulo}</h3>
        <p>Autor: ${libro.autor}</p>
        <p>Precio: $${libro.precio.toFixed(2)}</p>
        <p>Stock: ${libro.stock}</p>
        <div class="carta-botones">
          <button class="btn-fav" title="Remover de favoritos" onclick="event.stopPropagation(); toggleFavorito('${encodeURIComponent(libro.titulo)}')">
            <i class="fi fi-ss-heart"></i>
          </button>
          <button onclick="agregarCarritoPorTitulo('${encodeURIComponent(libro.titulo)}')">
            <i class="fi fi-rr-shopping-cart"></i> Agregar al Carrito
          </button>
        </div>
      `;
      contenedor.appendChild(card);
    });
  }

  // Devuelve una copia ordenada alfabéticamente por título.
  function obtenerLibrosOrdenados() {
    return [...libros].sort((a, b) => a.titulo.localeCompare(b.titulo));
  }

  function mostrarLibrosCliente() {
    const contenedor = document.getElementById("catalogoLibros");
    contenedor.innerHTML = "";

    if (libros.length === 0) {
      contenedor.innerHTML = "<p>No hay libros disponibles</p>";
      return;
    }

    // Vista catálogo normal (sin agrupar por saga)
    const librosOrdenados = obtenerLibrosOrdenados();

    librosOrdenados.forEach((libro) => {
      const carta = document.createElement("div");
      carta.className = "carta-libro";

      carta.innerHTML = `
        <img src="${libro.caratula || 'img/BookNest.png'}">
        <h3>${libro.titulo}</h3>
        <p>Autor: ${libro.autor}</p>
        <p>Estado: ${libro.estado}</p>
        <p>$${libro.precio ? libro.precio.toLocaleString('es-CO') : '0'}</p>
        <p>Stock: ${libro.stock}</p>
        <div class="carta-botones">
          <button class="btn-fav" title="${estaEnFavoritos(libro.titulo) ? 'Remover de favoritos' : 'Agregar a favoritos'}" onclick="event.stopPropagation(); toggleFavorito('${encodeURIComponent(libro.titulo)}')">
            <i class="${estaEnFavoritos(libro.titulo) ? 'fi fi-ss-heart' : 'fi fi-rr-heart'}"></i>
          </button>
          <button onclick="agregarCarritoPorTitulo('${encodeURIComponent(libro.titulo)}')">
            <i class="fi fi-rr-shopping-cart"></i> Agregar al Carrito
          </button>
        </div>
      `;

      contenedor.appendChild(carta);
    });
  }

  function mostrarSagas() {
    const contenedor = document.getElementById("sagasContainer");
    contenedor.innerHTML = "";

    if (libros.length === 0) {
      contenedor.innerHTML = "<p>No hay libros disponibles</p>";
      return;
    }

    // Agrupar por sagas
    const sagas = {};
    const librosSinSaga = [];
    
    libros.forEach(libro => {
      if (libro.saga && libro.saga.trim()) {
        if (!sagas[libro.saga]) sagas[libro.saga] = [];
        sagas[libro.saga].push(libro);
      } else {
        librosSinSaga.push(libro);
      }
    });

    // Ordenar sagas alfabéticamente
    const sagasOrdenadas = Object.keys(sagas).sort((a, b) => a.localeCompare(b));

    // Mostrar sagas con libros en layout horizontal
    sagasOrdenadas.forEach((saga) => {
      const librosSaga = sagas[saga];
      const seccionSaga = document.createElement("div");
      seccionSaga.className = "seccion-saga";
      
      const titulo = document.createElement("h3");
      titulo.textContent = saga;
      seccionSaga.appendChild(titulo);

      const contenedorLibros = document.createElement("div");
      contenedorLibros.className = "saga-libros";

      librosSaga.sort((a, b) => a.titulo.localeCompare(b.titulo)).forEach((libro) => {
        const carta = document.createElement("div");
        carta.className = "carta-libro";

        carta.innerHTML = `
          <img src="${libro.caratula || 'img/BookNest.png'}">
          <h3>${libro.titulo}</h3>
          <p>Autor: ${libro.autor}</p>
          <p>Estado: ${libro.estado}</p>
          <p>$${libro.precio ? libro.precio.toLocaleString('es-CO') : '0'}</p>
          <p>Stock: ${libro.stock}</p>
          <div class="carta-botones">
            <button class="btn-fav" title="${estaEnFavoritos(libro.titulo) ? 'Remover de favoritos' : 'Agregar a favoritos'}" onclick="event.stopPropagation(); toggleFavorito('${encodeURIComponent(libro.titulo)}')">
              <i class="${estaEnFavoritos(libro.titulo) ? 'fi fi-ss-heart' : 'fi fi-rr-heart'}"></i>
            </button>
            <button onclick="agregarCarritoPorTitulo('${encodeURIComponent(libro.titulo)}')">
              <i class="fi fi-rr-shopping-cart"></i> Agregar al Carrito
            </button>
          </div>
        `;

        contenedorLibros.appendChild(carta);
      });

      seccionSaga.appendChild(contenedorLibros);
      contenedor.appendChild(seccionSaga);
    });

    // Mostrar libros sin saga (si existen)
    if (librosSinSaga.length > 0) {
      const seccionSinSaga = document.createElement("div");
      seccionSinSaga.className = "seccion-saga";
      
      const titulo = document.createElement("h3");
      titulo.textContent = "Otros Libros";
      seccionSinSaga.appendChild(titulo);

      const contenedorLibros = document.createElement("div");
      contenedorLibros.className = "saga-libros";

      librosSinSaga.sort((a, b) => a.titulo.localeCompare(b.titulo)).forEach((libro) => {
        const carta = document.createElement("div");
        carta.className = "carta-libro";

        carta.innerHTML = `
          <img src="${libro.caratula || 'img/BookNest.png'}">
          <h3>${libro.titulo}</h3>
          <p>Autor: ${libro.autor}</p>
          <p>Estado: ${libro.estado}</p>
          <p>$${libro.precio ? libro.precio.toLocaleString('es-CO') : '0'}</p>
          <p>Stock: ${libro.stock}</p>
          <div class="carta-botones">
            <button class="btn-fav" title="${estaEnFavoritos(libro.titulo) ? 'Remover de favoritos' : 'Agregar a favoritos'}" onclick="event.stopPropagation(); toggleFavorito('${encodeURIComponent(libro.titulo)}')">
              <i class="${estaEnFavoritos(libro.titulo) ? 'fi fi-ss-heart' : 'fi fi-rr-heart'}"></i>
            </button>
            <button onclick="agregarCarritoPorTitulo('${encodeURIComponent(libro.titulo)}')">
              <i class="fi fi-rr-shopping-cart"></i> Agregar al Carrito
            </button>
          </div>
        `;

        contenedorLibros.appendChild(carta);
      });

      seccionSinSaga.appendChild(contenedorLibros);
      contenedor.appendChild(seccionSinSaga);
    }
  }

  function abrirModal(tipo, i) {
    accionPendiente = tipo;
    libroSeleccionado = libros[i];
    indiceSeleccionado = i;
    document.getElementById('modalTitulo').textContent =
      `Comprar "${libroSeleccionado.titulo}"`;
    document.getElementById('modalSub').textContent = `Disponible: ${libroSeleccionado.stock} ejemplares`;
    document.getElementById('cantidadInput').value = 1;
    document.getElementById('cantidadInput').max = libroSeleccionado.stock;
    document.getElementById('modalCantidad').style.display = 'flex';
  }

  function cerrarModal() { document.getElementById('modalCantidad').style.display = 'none'; accionPendiente = null; }

  function confirmarCantidad() {
    const cantidad = parseInt(document.getElementById('cantidadInput').value);
    if (isNaN(cantidad) || cantidad <= 0) return;
    if (cantidad > libroSeleccionado.stock) { mostrarMensaje('error', 'Cantidad superior al stock disponible'); return; }
    if (accionPendiente === 'comprar') showCheckout(libroSeleccionado, cantidad);
    cerrarModal();
  }


  // Agrega el libro al carrito por título (funciona con libros ordenados o filtrados)
  function agregarCarritoPorTitulo(tituloCodificado) {
      agregarCarritoPorTitulo(encodeURIComponent(titulo));
    const titulo = decodeURIComponent(tituloCodificado);
    const libro = libros.find(l => l.titulo === titulo);
    if (!libro) {
      mostrarMensaje('error', 'Libro no encontrado');
      return;
    }
    if (libro.stock <= 0) {
      mostrarMensaje('error', 'No hay stock disponible');
      return;
    }

    const existente = carrito.find(item => item.titulo === libro.titulo);
    if (existente) existente.cantidad++;
    else carrito.push({ titulo: libro.titulo, precio: libro.precio, cantidad: 1 });

    guardarDatos();
    mostrarCarrito();
    actualizarContadorCarrito();
    mostrarMensaje('success', 'Agregado al carrito');
  }

  function mostrarCarrito() {
    const tbody = document.querySelector("#tablaCarrito tbody");
    tbody.innerHTML = "";
    if (carrito.length === 0) {
      tbody.innerHTML = "<tr><td colspan='5'>El carrito está vacío</td></tr>";
    } else {
      carrito.forEach((item, i) => {
        const total = item.precio * item.cantidad;
        tbody.innerHTML += `
          <tr>
            <td>${item.titulo}</td>
            <td>${item.cantidad}</td>
            <td>$${item.precio.toFixed(2)}</td>
            <td>$${total.toFixed(2)}</td>
            <td><button onclick="eliminarDelCarrito(${i})">Eliminar</button></td>
          </tr>`;
      });
    }
    actualizarContadorCarrito();
  }

  function eliminarDelCarrito(i) { carrito.splice(i, 1); guardarDatos(); mostrarCarrito(); }

  function pagarCarrito() {
    if (carrito.length === 0) { mostrarMensaje('error', 'El carrito está vacío'); return; }
    compraPendiente = { carrito: true };
    document.getElementById('checkout').style.display = 'flex';
  }

  function abrirCarrito() { mostrarCarrito(); document.getElementById('modalCarrito').style.display = 'flex'; }
  function cerrarCarrito() { document.getElementById('modalCarrito').style.display = 'none'; }

  function showCheckout(libro, cantidad) { compraPendiente = { libro, cantidad }; document.getElementById('checkout').style.display = 'flex'; }
  function cerrarCheckout() {
    document.getElementById('checkout').style.display = 'none';
    compraPendiente = null;
    document.getElementById('tarjeta').value = '';
    document.getElementById('expiracion').value = '';
    document.getElementById('cvv').value = '';
    document.getElementById('titular').value = '';
    document.getElementById('tipoTarjeta').textContent = '';
  }

  function soloNumeros(input) { input.value = input.value.replace(/\D/g, ''); }
  function formatoExpiracion(input) { let v = input.value.replace(/\D/g, ''); if(v.length>2) v=v.slice(0,2)+'/'+v.slice(2,4); input.value=v; }

  function finishPurchase() {
    // Validar que el usuario esté activo
    if (!usuarioActivo) {
      alert("Debes estar logueado para realizar una compra");
      return false;
    }

    const tarjeta = document.getElementById('tarjeta').value.trim();
    const expiracion = document.getElementById('expiracion').value.trim();
    const cvv = document.getElementById('cvv').value.trim();
    const titular = document.getElementById('titular').value.trim();
    
    if(!/^\d{16}$/.test(tarjeta) || !/^(0[1-9]|1[0-2])\/\d{2}$/.test(expiracion) || !/^\d{3}$/.test(cvv) || titular.length===0){
      alert("Datos de tarjeta inválidos."); 
      return false;
    }

    const nombreCliente = usuarioActivo.nombre;
    const correoCliente = usuarioActivo.correo;
    const fecha = new Date().toLocaleString();
    let detalleFactura = [];

    // Procesar los libros comprados
    if(compraPendiente && compraPendiente.carrito){
      detalleFactura = carrito.map(item => ({titulo:item.titulo, cantidad:item.cantidad, precio:item.precio}));
      carrito.forEach(item => {
        const libro = libros.find(l => l.titulo === item.titulo);
        if(libro) libro.stock -= item.cantidad;
      });
      carrito = [];

    } else if(compraPendiente && compraPendiente.libro){
      const {libro, cantidad} = compraPendiente;
      libro.stock -= cantidad;
      detalleFactura = [{titulo:libro.titulo, cantidad, precio:libro.precio}];
    } else {
      alert("No hay compra pendiente");
      return false;
    }

    // Guardar stock actualizado
    guardarDatos();

    const totalFactura = detalleFactura.reduce((sum,item) => sum + item.precio*item.cantidad, 0);
    const tipoTarjeta = document.getElementById("tipoTarjeta").textContent.replace("💳 ","") || "—";
    const ultimos4 = tarjeta.slice(-4);

    // Crear nueva factura
    const nuevaFactura = {
      id: Date.now(),
      cliente: nombreCliente,
      correo: correoCliente,
      fecha,
      detalle: detalleFactura,
      total: totalFactura,
      tarjetaTipo: tipoTarjeta,
      tarjetaUltimos4: ultimos4
    };

    // Guardar en facturas del usuario
    const facturas = JSON.parse(localStorage.getItem(`facturas_${usuarioActivo.usuario}`)) || [];
    facturas.push(nuevaFactura);
    localStorage.setItem(`facturas_${usuarioActivo.usuario}`, JSON.stringify(facturas));

    // Guardar en transacciones global (admin panel)
    transacciones.push({
      fecha,
      usuario: nombreCliente,
      correo: correoCliente,
      tipo: "venta",
      libro: detalleFactura.map(d => d.titulo).join(", "), 
      total: totalFactura,
      detalle: detalleFactura
    });
    localStorage.setItem("transacciones", JSON.stringify(transacciones));

    // Guardar en historial del usuario
    detalleFactura.forEach(item => {
      historialCliente.push({ fecha, libro: item.titulo, tipo: "Compra", estado: "Completada" });
    });
    localStorage.setItem(`historial_${usuarioActivo.usuario}`, JSON.stringify(historialCliente));

    // Guardar también en facturas globales (para admin)
    let facturasGlobales = JSON.parse(localStorage.getItem("facturas")) || [];
    facturasGlobales.push(nuevaFactura);
    localStorage.setItem("facturas", JSON.stringify(facturasGlobales));

    // Limpiar UI y mostrar estado actualizado
    actualizarVistaActual();
    mostrarCarrito(); 
    cerrarCheckout(); 
    mostrarFacturasGuardadas();
    actualizarContadorCarrito();
    mostrarMensaje('success','Compra realizada y factura generada correctamente');
    compraPendiente = null;
    
    return false;
  }

  function verPerfil(){ window.location.href="usuario.html"; }

  const botonMenu=document.getElementById('botonMenu');
  const menuOpciones=document.getElementById('menuOpciones');
  if (botonMenu && menuOpciones) {
    botonMenu.addEventListener('click', e=>{ e.stopPropagation(); menuOpciones.style.display = menuOpciones.style.display==='flex'?'none':'flex'; });
    window.addEventListener('click',()=>{ menuOpciones.style.display='none'; });
  }

  function actualizarContadorCarrito(){
    const contador=document.getElementById("contadorCarrito");
    if(!contador) return;
    const totalItems=carrito.reduce((total,item)=>total+(item.cantidad||1),0);
    contador.textContent=totalItems>0?totalItems:0;
  }

  function toggleFacturas(){
    const seccionTabla=document.getElementById('tablaFacturasCliente');
    if (!seccionTabla) return;
    seccionTabla.style.display = seccionTabla.style.display==='table'?'none':'table';
    mostrarFacturasGuardadas();
  }

  function mostrarFacturasGuardadas(){
    const tbody=document.querySelector("#tablaFacturasCliente tbody");
    if (!tbody) return;
    const facturas = JSON.parse(localStorage.getItem(`facturas_${usuarioActivo.usuario}`)) || [];
    tbody.innerHTML="";
    if(facturas.length===0) tbody.innerHTML="<tr><td colspan='4'>No hay facturas</td></tr>";
    else facturas.forEach((f,i)=>{
      tbody.innerHTML+=`<tr>
        <td>${f.id}</td><td>${f.fecha}</td><td>$${f.total.toFixed(2)}</td>
        <td><button onclick="verFactura(${i})">Ver</button></td>
      </tr>`;
    });
  }

  function verFactura(indice){
    const facturas=JSON.parse(localStorage.getItem(`facturas_${usuarioActivo.usuario}`))||[];
    if(!facturas[indice]) return;
    const f=facturas[indice];
    document.getElementById('facturaCliente').textContent=f.cliente;
    document.getElementById('facturaCorreo').textContent=f.correo;
    document.getElementById('facturaFecha').textContent=f.fecha;
    document.getElementById('facturaTipo').textContent=f.tarjetaTipo;
    document.getElementById('facturaUltimos4').textContent=f.tarjetaUltimos4;
    const tbody=document.getElementById('facturaTabla'); tbody.innerHTML="";
    f.detalle.forEach(d=>{ tbody.innerHTML+=`<tr>
      <td>${d.titulo}</td><td>${d.cantidad}</td><td>$${d.precio.toFixed(2)}</td><td>$${(d.cantidad*d.precio).toFixed(2)}</td>
    </tr>`; });
    document.getElementById('facturaTotal').textContent=f.total.toFixed(2);
    document.getElementById('modalFactura').style.display='flex';
  }

  function cerrarModalFactura(){ document.getElementById('modalFactura').style.display='none'; }


function buscarLibros() {
  const texto = document.getElementById("buscadorLibros").value.toLowerCase();
  
  // Determinar en qué sección estamos
  const seccionCatalogo = document.getElementById('seccionCatalogo');
  const seccionSagas = document.getElementById('seccionSagas');
  
  if (!texto) {
    // Si el input queda vacío, mostrar la sección actual completamente
    if (seccionSagas.style.display !== 'none') {
      mostrarSagas();
    } else {
      mostrarLibrosCliente();
    }
    return;
  }

  const filtrados = obtenerLibrosOrdenados().filter(libro =>
    libro.titulo.toLowerCase().includes(texto) ||
    libro.autor.toLowerCase().includes(texto)
  );

  // Si estamos en sagas, mostrar filtrados en sagas
  if (seccionSagas.style.display !== 'none') {
    mostrarLibrosFiltradosSagas(filtrados);
  } else {
    // Si estamos en catálogo, mostrar filtrados en catálogo
    mostrarLibrosFiltradosCatalogo(filtrados);
  }
}

function mostrarLibrosFiltradosCatalogo(filtrados) {
  const contenedor = document.getElementById("catalogoLibros");
  contenedor.innerHTML = "";

  if (filtrados.length === 0) {
    contenedor.innerHTML = "<p>No se encontraron libros</p>";
    return;
  }

  filtrados.forEach((libro) => {
    const carta = document.createElement("div");
    carta.className = "carta-libro";

    carta.innerHTML = `
      <img src="${libro.caratula || 'img/BookNest.png'}">
      <h3>${libro.titulo}</h3>
      <p>Autor: ${libro.autor}</p>
      <p>Estado: ${libro.estado}</p>
      <p>$${libro.precio ? libro.precio.toLocaleString('es-CO') : '0'}</p>
      <p>Stock: ${libro.stock}</p>
      <div class="carta-botones">
        <button class="btn-fav" title="${estaEnFavoritos(libro.titulo) ? 'Remover de favoritos' : 'Agregar a favoritos'}" onclick="event.stopPropagation(); toggleFavorito('${encodeURIComponent(libro.titulo)}')">
          <i class="${estaEnFavoritos(libro.titulo) ? 'fi fi-ss-heart' : 'fi fi-rr-heart'}"></i>
        </button>
        <button onclick="agregarCarritoPorTitulo('${encodeURIComponent(libro.titulo)}')">
          <i class="fi fi-rr-shopping-cart"></i> Agregar al Carrito
        </button>
      </div>
    `;
    contenedor.appendChild(carta);
  });
}

function mostrarLibrosFiltradosSagas(filtrados) {
  const contenedor = document.getElementById("sagasContainer");
  contenedor.innerHTML = "";

  if (filtrados.length === 0) {
    contenedor.innerHTML = "<p>No se encontraron libros</p>";
    return;
  }

  // Agrupar por sagas los filtrados
  const sagas = {};
  const librosSinSaga = [];
  
  filtrados.forEach(libro => {
    if (libro.saga && libro.saga.trim()) {
      if (!sagas[libro.saga]) sagas[libro.saga] = [];
      sagas[libro.saga].push(libro);
    } else {
      librosSinSaga.push(libro);
    }
  });

  // Ordenar sagas alfabéticamente
  const sagasOrdenadas = Object.keys(sagas).sort((a, b) => a.localeCompare(b));

  // Mostrar sagas filtradas
  sagasOrdenadas.forEach((saga) => {
    const librosSaga = sagas[saga];
    const seccionSaga = document.createElement("div");
    seccionSaga.className = "seccion-saga";
    
    const titulo = document.createElement("h3");
    titulo.textContent = saga;
    seccionSaga.appendChild(titulo);

    const contenedorLibros = document.createElement("div");
    contenedorLibros.className = "saga-libros";

    librosSaga.sort((a, b) => a.titulo.localeCompare(b.titulo)).forEach((libro) => {
      const carta = document.createElement("div");
      carta.className = "carta-libro";

      carta.innerHTML = `
        <img src="${libro.caratula || 'img/BookNest.png'}">
        <h3>${libro.titulo}</h3>
        <p>Autor: ${libro.autor}</p>
        <p>Estado: ${libro.estado}</p>
        <p>$${libro.precio ? libro.precio.toLocaleString('es-CO') : '0'}</p>
        <p>Stock: ${libro.stock}</p>
        <div class="carta-botones">
          <button class="btn-fav" title="${estaEnFavoritos(libro.titulo) ? 'Remover de favoritos' : 'Agregar a favoritos'}" onclick="event.stopPropagation(); toggleFavorito('${encodeURIComponent(libro.titulo)}')">
            <i class="${estaEnFavoritos(libro.titulo) ? 'fi fi-ss-heart' : 'fi fi-rr-heart'}"></i>
          </button>
          <button onclick="agregarCarritoPorTitulo('${encodeURIComponent(libro.titulo)}')">
            <i class="fi fi-rr-shopping-cart"></i> Agregar al Carrito
          </button>
        </div>
      `;
      contenedorLibros.appendChild(carta);
    });

    seccionSaga.appendChild(contenedorLibros);
    contenedor.appendChild(seccionSaga);
  });

  // Mostrar libros sin saga (si existen)
  if (librosSinSaga.length > 0) {
    const seccionSinSaga = document.createElement("div");
    seccionSinSaga.className = "seccion-saga";
    
    const titulo = document.createElement("h3");
    titulo.textContent = "Otros Libros";
    seccionSinSaga.appendChild(titulo);

    const contenedorLibros = document.createElement("div");
    contenedorLibros.className = "saga-libros";

    librosSinSaga.sort((a, b) => a.titulo.localeCompare(b.titulo)).forEach((libro) => {
      const carta = document.createElement("div");
      carta.className = "carta-libro";

      carta.innerHTML = `
        <img src="${libro.caratula || 'img/BookNest.png'}">
        <h3>${libro.titulo}</h3>
        <p>Autor: ${libro.autor}</p>
        <p>Estado: ${libro.estado}</p>
        <p>$${libro.precio ? libro.precio.toLocaleString('es-CO') : '0'}</p>
        <p>Stock: ${libro.stock}</p>
        <div class="carta-botones">
          <button class="btn-fav" title="${estaEnFavoritos(libro.titulo) ? 'Remover de favoritos' : 'Agregar a favoritos'}" onclick="event.stopPropagation(); toggleFavorito('${encodeURIComponent(libro.titulo)}')">
            <i class="${estaEnFavoritos(libro.titulo) ? 'fi fi-ss-heart' : 'fi fi-rr-heart'}"></i>
          </button>
          <button onclick="agregarCarritoPorTitulo('${encodeURIComponent(libro.titulo)}')">
            <i class="fi fi-rr-shopping-cart"></i> Agregar al Carrito
          </button>
        </div>
      `;
      contenedorLibros.appendChild(carta);
    });

    seccionSinSaga.appendChild(contenedorLibros);
    contenedor.appendChild(seccionSinSaga);
  }
}
